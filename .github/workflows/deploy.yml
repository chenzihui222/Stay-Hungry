name: VC Tracker Deploy

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Run crawler
        run: |
          python3 -c "
          import sys, os, shutil
          sys.path.insert(0, '.')
          os.makedirs('vc_tracker', exist_ok=True)
          os.makedirs('config', exist_ok=True)
          open('config/__init__.py', 'a').close()
          from vc_tracker.multi_crawler import MultiCrawler
          mc = MultiCrawler()
          mc.crawl_selected(['hackernews', 'paulgraham'], max_items_per_site=20)
          mc.save_data()
          os.makedirs('static', exist_ok=True)
          if os.path.exists('data/multi_source_news.json'):
              shutil.copy('data/multi_source_news.json', 'static/data.json')
              print(f'Success! Crawled {len(mc.data)} items')
          else:
              print('Warning: No data file generated')
          "

      - name: Commit data changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/ static/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update data: $(date +'%Y-%m-%d %H:%M')"
          git push || echo "Nothing to push"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build site
        run: |
          mkdir -p _site
          cp static/* _site/
          if [ ! -f "_site/data.json" ]; then
            echo "[]" > _site/data.json
          fi
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
