name: 自动更新科创金融研究网站

on:
  # 定时触发 - 每天北京时间早上8点执行 (UTC 00:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      scraper_type:
        description: '选择要运行的抓取器类型'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - market
          - vc
          - policy
  
  # 代码推送时触发
  push:
    branches:
      - main
      - master

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    # 检出代码
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    # 设置 Python 环境
    - name: 设置 Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    # 缓存 pip 依赖
    - name: 缓存 pip 依赖
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    # 安装依赖
    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # 运行新的统一数据抓取系统
    - name: 运行科创金融数据抓取
      run: |
        echo "开始运行科创金融数据抓取系统..."
        cd src
        python crawler.py --type ${{ github.event.inputs.scraper_type || 'all' }}
      continue-on-error: true
    
    # 检查数据文件是否生成
    - name: 检查数据文件
      run: |
        echo "检查生成的数据文件..."
        ls -la data/raw/merged/ || echo "合并目录不存在"
        ls -la data/raw/reports/ || echo "报告目录不存在"
        echo "数据抓取统计:"
        find data/raw -name "*.json" -type f | wc -l
    
    # 提交数据更新
    - name: 提交数据更新
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 添加数据文件
        git add data/raw/
        
        # 添加日志文件（可选）
        if [ -f crawler.log ]; then
          git add crawler.log
        fi
        
        # 提交更改
        git diff --staged --quiet || git commit -m "🤖 自动更新: 数据抓取 - $(date +'%Y-%m-%d %H:%M:%S')"
        git push || echo "没有新的更改需要提交"
      continue-on-error: true
    
    # 生成统计报告摘要
    - name: 生成摘要报告
      run: |
        echo "📊 数据抓取完成摘要" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f data/raw/reports/latest_report.json ]; then
          echo "```json" >> $GITHUB_STEP_SUMMARY
          cat data/raw/reports/latest_report.json >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ 未找到报告文件" >> $GITHUB_STEP_SUMMARY
        fi

  # 部署任务（只在 main/master 分支上运行）
  deploy:
    needs: crawl-and-update
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 生成静态网站
      run: |
        echo "开始生成静态网站..."
        python src/generators/site_generator.py
    
    - name: 部署到 GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
        cname: ''  # 如果有自定义域名，在此填写
        commit_message: "🚀 自动部署: 更新网站 - $(date +'%Y-%m-%d %H:%M:%S')"
